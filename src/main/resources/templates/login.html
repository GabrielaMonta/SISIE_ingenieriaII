<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISIE - Inicio de Sesión</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <div class="logo-box">
                <i class="fas fa-box-open"></i>
            </div>
            <h1 class="brand-name">SISIE</h1>
            <p class="subtitle">Sistema de inventario y gestión de envíos</p>
        </div>

        <div class="login-body">
            <div th:if="${param.error}" class="alert alert-error">
                Correo o contraseña incorrectos.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                Has cerrado sesión correctamente.
            </div>
            <form action="#" th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label"><i class="fas fa-envelope"></i> Correo electrónico</label>
                    <div class="input-wrapper">
                        <input type="email" name="username" class="form-input" placeholder="ejemplo@correo.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label"><i class="fas fa-lock"></i> Contraseña</label>
                    <div class="input-wrapper">
                        <input type="password" name="password" class="form-input" placeholder="Tu contraseña" required>
                        <i class="fas fa-eye-slash input-icon-end"></i>
                    </div>
                </div>

                <div class="login-options">
                    <input type="checkbox" id="remember">
                    <label for="remember">Recordar sesión</label>
                </div>

                <button type="submit" class="login-button">Iniciar Sesión</button>
            </form>
        </div>

        <div class="login-footer">
            <p>© 2026 SISIE. Todos los derechos reservados.</p>
        </div>
    </div>

    <!-- Script para mostrar/ocultar contraseña -->
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const togglePassword = document.querySelector(".input-icon-end");
            const passwordInput = document.querySelector("input[name='password']");

            if (togglePassword && passwordInput) {
                togglePassword.addEventListener("click", function() {
                    const type = passwordInput.getAttribute("type") === "password" ? "text" : "password";
                    passwordInput.setAttribute("type", type);
                    this.classList.toggle("fa-eye");
                    this.classList.toggle("fa-eye-slash");
                });
            }
        });
    </script>
</body>
</html>
